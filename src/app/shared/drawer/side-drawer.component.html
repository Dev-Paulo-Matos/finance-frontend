@if (drawer.isOpen()) {

  <!-- backdrop -->
  <div 
    class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40"
    (click)="drawer.close()">
  </div>

  <!-- drawer -->
  <div class="fixed top-0 right-0 h-full w-[480px] bg-slate-900 border-l border-slate-700 shadow-2xl z-50 flex flex-col animate-drawer">

    <!-- header -->
    <div class="flex items-center justify-between p-6 border-b border-slate-700">

      <h2 class="text-lg font-semibold text-white">
        {{ drawer.title() }}
      </h2>

      <button
        (click)="drawer.close()"
        class="text-slate-400 hover:text-white text-xl">
        ×
      </button>

    </div>

    <!-- conteúdo -->
    <div class="flex-1 overflow-auto p-6">

      <ng-container
        *ngComponentOutlet="drawer.component(); 
        inputs: { data: drawer.data() }">
      </ng-container>

    </div>

  </div>

}
