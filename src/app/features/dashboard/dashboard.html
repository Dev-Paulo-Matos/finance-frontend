<div id="tab-dashboard" class="tab-content">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

    <!-- Saldo -->
    <div class="bg-slate-800 rounded-xl p-6 border border-slate-700">
      <div class="flex items-center justify-between mb-4">
        <span class="text-slate-400 text-sm">Saldo Total</span>

        <div class="w-10 h-10 bg-emerald-500/20 rounded-lg flex items-center justify-center">
          <ng-icon name="tablerWallet" class="w-5 h-5 text-emerald-400"></ng-icon>
        </div>
      </div>

      <p id="total-balance" class="text-2xl font-bold text-emerald-400">
        R$ 0,00
      </p>
    </div>

    <!-- Receitas -->
    <div class="bg-slate-800 rounded-xl p-6 border border-slate-700">
      <div class="flex items-center justify-between mb-4">
        <span class="text-slate-400 text-sm">Receitas</span>

        <div class="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center">
          <ng-icon name="tablerTrendingUp" class="w-5 h-5 text-blue-400"></ng-icon>
        </div>
      </div>

      <p id="total-income" class="text-2xl font-bold text-blue-400">
        R$ 0,00
      </p>
    </div>

    <!-- Despesas -->
    <div class="bg-slate-800 rounded-xl p-6 border border-slate-700">
      <div class="flex items-center justify-between mb-4">
        <span class="text-slate-400 text-sm">Despesas</span>

        <div class="w-10 h-10 bg-red-500/20 rounded-lg flex items-center justify-center">
          <ng-icon name="tablerTrendingDown" class="w-5 h-5 text-red-400"></ng-icon>
        </div>
      </div>

      <p id="total-expenses" class="text-2xl font-bold text-red-400">
        R$ 0,00
      </p>
    </div>

  </div>

  <div class="bg-slate-800 rounded-xl border border-slate-700">
    <div class="p-6 border-b border-slate-700">
      <h3 class="font-semibold">Últimas Transações</h3>
    </div>

    <div id="recent-transactions" class="p-6">
      <p class="text-slate-500 text-center py-8">
        Nenhuma transação registrada
      </p>
    </div>
  </div>
</div>
