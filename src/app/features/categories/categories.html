<div class="categories-wrapper">
  <header class="page-header">
    <div class="title">
      <h1>Categorias & Orçamentos</h1>
      <p>Defina limites mensais para controlar seus gastos por setor.</p>
    </div>
    <button mat-raised-button color="primary" class="add-btn">
      <mat-icon>add</mat-icon> Nova Categoria
    </button>
  </header>

  <div class="categories-grid">
    <div class="category-card card" *ngFor="let cat of categories">
      <div class="card-top">
        <div class="icon-box" [style.background-color]="cat.color + '20'" [style.color]="cat.color">
          <mat-icon>{{ cat.icon }}</mat-icon>
        </div>
        <button mat-icon-button><mat-icon>edit</mat-icon></button>
      </div>

      <div class="card-info">
        <h3>{{ cat.name }}</h3>
        <div class="values">
          <span class="spent">{{ cat.spent | currency:'BRL' }}</span>
          <span class="limit">de {{ cat.limit | currency:'BRL' }}</span>
        </div>
      </div>

      <div class="progress-section">
        <mat-progress-bar 
          mode="determinate" 
          [value]="calculatePercentage(cat.spent, cat.limit)"
          [class.over-limit]="cat.spent > cat.limit">
        </mat-progress-bar>
        <span class="percentage" [style.color]="cat.spent > cat.limit ? '#e74c3c' : '#8e9297'">
          {{ (cat.spent / cat.limit) | percent }}
        </span>
      </div>
    </div>
  </div>
</div>
