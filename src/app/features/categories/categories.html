<div id="tab-categories" class="tab-content">
  <div class="bg-slate-800 rounded-xl border border-slate-700">

    <div class="p-6 border-b border-slate-700">
      <div class="flex items-center justify-between mb-6">
        <h3 class="font-semibold text-lg">Categorias</h3>
        <button
          class="flex items-center gap-2 px-4 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-colors"
          (click)="novaCategoriaDrawer()">
          <ng-icon name="tablerPlus" class="w-4 h-4"></ng-icon>
          <span>Nova Categoria</span>
        </button>
      </div>

      <!-- Filtros -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-slate-700/30 p-4 rounded-lg">
        <div>
          <label class="block text-xs text-slate-400 mb-1">Nome da Categoria</label>
          <input type="text" [(ngModel)]="filter.name" (keyup.enter)="applyFilter()"
            placeholder="Buscar por nome..."
            class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500">
        </div>

        <div>
          <label class="block text-xs text-slate-400 mb-1">Tipo de Transação</label>
          <select [(ngModel)]="filter.transactionType" (change)="applyFilter()"
            class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 font-sans">
            <option [ngValue]="undefined">Todos os tipos</option>
            <option *ngFor="let type of transactionTypes" [ngValue]="type">{{ type === 'INCOME' ? 'Receita' : 'Despesa' }}</option>
          </select>
        </div>

        <div class="lg:col-span-2 flex justify-end gap-2 items-end">
          <button (click)="clearFilter()"
            class="px-4 py-2 text-sm text-slate-400 hover:text-white transition-colors">
            Limpar
          </button>
          <button (click)="applyFilter()"
            class="px-6 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-500 transition-colors text-sm">
            Filtrar
          </button>
        </div>
      </div>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full">

        <thead class="bg-slate-700/50">
          <tr>
            <th class="text-left px-6 py-4 text-sm font-medium text-slate-400 w-1/2">Nome</th>
            <th class="text-left px-6 py-4 text-sm font-medium text-slate-400 w-1/4">Tipo</th>
            <th class="text-right px-6 py-4 text-sm font-medium text-slate-400 w-1/4">Ações</th>
          </tr>
        </thead>

        <tbody class="divide-y divide-slate-700">

          <tr *ngIf="categories.length === 0">
            <td colspan="3" class="px-6 py-8 text-center text-slate-500">
              Nenhuma categoria cadastrada
            </td>
          </tr>

          <tr *ngFor="let category of categories">

            <!-- Nome -->
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full" [style.background]="category.color"></div>
                <span>{{ category.name }}</span>
              </div>
            </td>

            <!-- Tipo -->
            <td class="px-6 py-4">
              <span
                class="px-2 py-1 text-xs rounded"
                [ngClass]="{
                  'bg-red-500/20 text-red-400': category.type === 'EXPENSE',
                  'bg-emerald-500/20 text-emerald-400': category.type === 'INCOME'
                }">

                {{ category.type === 'EXPENSE' ? 'Despesa' : 'Receita' }}

              </span>
            </td>

            <!-- Ações -->
            <td class="px-6 py-4">
              <div class="flex justify-end gap-3">

                <button
                  class="text-slate-400 hover:text-white transition-colors"
                  (click)="btnEdit(category)">

                  <ng-icon name="tablerEdit" class="w-5 h-5"></ng-icon>

                </button>

                <button
                  class="text-slate-400 hover:text-red-400 transition-colors"
                  (click)="deleteCategory(category)">

                  <ng-icon name="tablerTrash" class="w-5 h-5"></ng-icon>

                </button>

              </div>
            </td>

          </tr>

        </tbody>

      </table>
       <div class="flex items-center justify-between p-4 border-t border-slate-700">

        <span class="text-sm text-slate-400">
          {{ totalElements || 0 }} registros
        </span>

        <div class="flex items-center gap-3">

          <button (click)="previousPage()" [disabled]="page === 0"
            class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 disabled:opacity-40">

            Anterior

          </button>

          <span class="text-sm text-slate-300">
            Página {{ page + 1 }} / {{ totalPages }}
          </span>

          <button (click)="nextPage()" [disabled]="page + 1 >= totalPages"
            class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 disabled:opacity-40">

            Próxima

          </button>

        </div>

      </div>
    </div>

  </div>
</div>
