<div class="container" [class.right-panel-active]="isRegisterMode">

  <div class="form-container sign-up-container">
    <div class="form-container sign-up-container">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <h1>Create Account</h1>
        <input type="text" placeholder="Nome" formControlName="name" />
        <input type="text" placeholder="Telefone" formControlName="phone" />
        <input type="email" placeholder="Email" formControlName="email" />
        <input type="password" placeholder="Password" formControlName="password" />
        <button type="submit" class="btn-primary">Registration</button>
      </form>
    </div>
  </div>

  <div class="form-container sign-in-container">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <h1>Login</h1>
      <input type="email" for placeholder="Email" formControlName="email" />
      <input type="password" placeholder="Password" formControlName="password" />
      <br>
      <button class="btn-primary">Login</button>
    </form>
  </div>

  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel overlay-left">
        <h1>Welcome Back!</h1>
        <button class="ghost" (click)="toggleMode()">Login</button>
      </div>
      <div class="overlay-panel overlay-right">
        <h1>Hello, Welcome!</h1>
        <p>Don't have an account?</p>
        <button class="ghost" (click)="toggleMode()">Registration</button>
      </div>
    </div>
  </div>
</div>
