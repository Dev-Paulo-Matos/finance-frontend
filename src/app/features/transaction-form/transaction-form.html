<div class="p-6 space-y-6">

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

    <!-- descrição -->
    <div>
      <label class="text-sm text-slate-400">Descrição</label>
      <input
        formControlName="description"
        class="w-full mt-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500">
      <app-form-field-error [control]="form.get('description')"></app-form-field-error>
    </div>

    <!-- valor -->
    <div>
      <label class="text-sm text-slate-400">Valor</label>
      <input
        type="number"
        formControlName="amount"
        class="w-full mt-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg">
      <app-form-field-error [control]="form.get('amount')"></app-form-field-error>
    </div>

    <!-- data -->
    <div>
      <label class="text-sm text-slate-400">Data</label>
      <input
        type="date"
        formControlName="date"
        class="w-full mt-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg">
      <app-form-field-error [control]="form.get('date')"></app-form-field-error>
    </div>

    <!-- tipo -->
    <div>
      <label class="text-sm text-slate-400">Tipo</label>

      <select
        formControlName="type"
        class="w-full mt-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg">

        <option value="EXPENSE">Despesa</option>
        <option value="INCOME">Receita</option>

      </select>
      <app-form-field-error [control]="form.get('type')"></app-form-field-error>
    </div>

    <!-- conta -->
    <div>
      <label class="text-sm text-slate-400">Conta</label>

      <select
        formControlName="accountId"
        class="w-full mt-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg">

        <option *ngFor="let account of accounts" [value]="account.id">
          {{ account.name }}
        </option>

      </select>
      <app-form-field-error [control]="form.get('accountId')"></app-form-field-error>
    </div>

    <!-- categoria -->
    <div>
      <label class="text-sm text-slate-400">Categoria</label>

      <select
        formControlName="categoryId"
        class="w-full mt-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg">

        <option *ngFor="let category of categories" [value]="category.id">
          {{ category.name }}
        </option>

      </select>
      <app-form-field-error [control]="form.get('categoryId')"></app-form-field-error>
    </div>

    <!-- botões -->
    <div class="flex justify-end gap-3 pt-4">

      <button
        type="button"
        (click)="drawer.close()"
        class="px-4 py-2 bg-slate-700 rounded-lg hover:bg-slate-600">

        Cancelar

      </button>

      <button
        type="submit"
        class="px-4 py-2 bg-emerald-500 rounded-lg hover:bg-emerald-600">

        Salvar

      </button>

    </div>

  </form>

</div>
