<div class="modal-header">
  <h2 mat-dialog-title>{{ isViewMode ? 'Detalhes' : (isEditMode ? 'Editar' : 'Nova') }} Conta</h2>
</div>

<mat-dialog-content class="custom-content">
  <form [formGroup]="form" class="vertical-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nome da Conta</mat-label>
      <input matInput formControlName="name" placeholder="Ex: Nubank">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descrição</mat-label>
      <input matInput formControlName="desc" placeholder="Ex: Conta Corrente">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Saldo Inicial</mat-label>
      <input matInput type="number" formControlName="balance">
      <span matPrefix>R$&nbsp;</span>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="modal-actions">
  <button mat-button (click)="onCancel()" color="warn">Cancelar</button>
  <button mat-raised-button color="primary" 
          [disabled]="form.invalid" (click)="onSave()">
    {{ isEditMode ? 'Atualizar' : 'Salvar' }}
  </button>
</mat-dialog-actions>
