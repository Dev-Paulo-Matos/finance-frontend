<form
  [formGroup]="form"
  (ngSubmit)="submit()"
  class="flex flex-col h-full">

  <div class="p-6 space-y-6 flex-1 overflow-auto">

    <!-- Nome -->
    <div>
      <label class="block text-sm text-slate-400 mb-2">
        Nome da Conta
      </label>

      <input
        type="text"
        formControlName="name"
        class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:border-emerald-500">
    </div>

    <!-- Descrição -->
    <div>
      <label class="block text-sm text-slate-400 mb-2">
        Descrição
      </label>

      <input
        type="text"
        formControlName="desc"
        class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg">
    </div>

    <!-- Saldo -->
    <div>
      <label class="block text-sm text-slate-400 mb-2">
        Saldo Inicial
      </label>

      <input
        type="number"
        formControlName="balance"
        class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg">
    </div>

  </div>

  <div class="p-6 border-t border-slate-700 flex justify-end gap-3">

    <button
      type="button"
      (click)="drawer.close()"
      class="px-4 py-2 text-slate-400 hover:text-white">
      Cancelar
    </button>

    <button
      type="submit"
      class="px-4 py-2 bg-emerald-500 rounded-lg hover:bg-emerald-600">
      Salvar
    </button>

  </div>

</form>
