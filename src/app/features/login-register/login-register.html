<div id="auth-container" class="h-full w-full flex items-center justify-center">

  <div class="w-full max-w-md mx-4">

    <!-- LOGIN -->
    <div *ngIf="showLogin" class="bg-slate-800 rounded-2xl border border-slate-700 p-8 shadow-2xl">

      <div class="text-center mb-8">

        <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <ng-icon name="tablerWallet" class="w-16 h-16 text-emerald-400"></ng-icon>
        </div>

        <h1 class="text-2xl font-bold mb-2">Finanças</h1>
        <p class="text-slate-400 text-sm">Gerencie suas contas e transações</p>

      </div>

      <div *ngIf="loginErrorMessage" class="mb-4 rounded-lg border border-red-500/40 bg-red-500/10 px-4 py-3 text-sm text-red-300">
        {{ loginErrorMessage }}
      </div>

      <form class="space-y-4 mb-6" [formGroup]="loginForm" (ngSubmit)="handleLogin()">

        <div>
          <label class="block text-sm text-slate-400 mb-2">Email</label>

          <input
            type="email"
            formControlName="email"
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:outline-none focus:border-emerald-500 text-white"
            placeholder="seu@email.com"
          />
          <app-form-field-error [control]="loginForm.get('email')"></app-form-field-error>
        </div>

        <div>
          <label class="block text-sm text-slate-400 mb-2">Senha</label>

          <input
            type="password"
            formControlName="password"
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:outline-none focus:border-emerald-500 text-white"
            placeholder="••••••••"
          />
          <app-form-field-error
            [control]="loginForm.get('password')"
            [customMessages]="{ minlength: 'A senha deve ter no mínimo 6 caracteres.' }"
          ></app-form-field-error>
        </div>

        <button type="submit" [disabled]="loginForm.invalid"
          class="w-full py-3 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-colors font-medium mt-6 disabled:opacity-50">

          Entrar
        </button>

      </form>

      <div class="text-center">
        <p class="text-slate-400 text-sm">
          Não tem conta?
          <button type="button" (click)="switchToRegister()"
            class="text-emerald-400 hover:text-emerald-300 font-semibold">
            Criar conta
          </button>
        </p>
      </div>

    </div>

    <!-- REGISTER -->
    <div *ngIf="!showLogin" class="bg-slate-800 rounded-2xl border border-slate-700 p-8 shadow-2xl">

      <div class="text-center mb-8">

        <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <ng-icon name="tablerUser" class="w-16 h-16 text-emerald-400"></ng-icon>
        </div>

        <h1 class="text-2xl font-bold mb-2">Criar Conta</h1>
        <p class="text-slate-400 text-sm">Comece a gerenciar suas finanças</p>

      </div>

      <div *ngIf="registerErrorMessage" class="mb-4 rounded-lg border border-red-500/40 bg-red-500/10 px-4 py-3 text-sm text-red-300">
        {{ registerErrorMessage }}
      </div>

      <form class="space-y-4 mb-6" [formGroup]="registerForm" (ngSubmit)="handleRegister()">

        <div>
          <input
            type="text"
            formControlName="name"
            placeholder="Seu nome completo"
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white"
          />
          <app-form-field-error [control]="registerForm.get('name')"></app-form-field-error>
        </div>

        <div>
          <input
            type="email"
            formControlName="email"
            placeholder="seu@email.com"
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white"
          />
          <app-form-field-error [control]="registerForm.get('email')"></app-form-field-error>
        </div>

        <div>
          <input
            type="tel"
            formControlName="phone"
            placeholder="(11) 99999-9999"
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white"
            (input)="onPhoneInput($event)"
          />
          <app-form-field-error
            [control]="registerForm.get('phone')"
            [customMessages]="{ invalidPhone: 'Informe um telefone válido com DDD.' }"
          ></app-form-field-error>
        </div>

        <div>
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white"
          />
          <app-form-field-error
            [control]="registerForm.get('password')"
            [customMessages]="{ minlength: 'A senha deve ter no mínimo 6 caracteres.' }"
          ></app-form-field-error>
        </div>

        <div>
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="Confirmar senha"
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white"
          />
          <app-form-field-error [control]="registerForm.get('confirmPassword')"></app-form-field-error>
          <p *ngIf="passwordsDoNotMatch" class="mt-1 text-xs text-red-400">
            As senhas não coincidem.
          </p>
        </div>

        <button type="submit" [disabled]="registerForm.invalid"
          class="w-full py-3 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-colors font-medium mt-6 disabled:opacity-50">

          Criar Conta
        </button>

      </form>

      <div class="text-center">
        <p class="text-slate-400 text-sm">
          Já tem conta?
          <button type="button" (click)="switchToLogin()" class="text-emerald-400 hover:text-emerald-300 font-semibold">
            Fazer login
          </button>
        </p>
      </div>

    </div>

  </div>

</div>
