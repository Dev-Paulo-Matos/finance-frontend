<aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0 h-full">
  <div class="p-6 border-b border-slate-700">
    <h1 id="dashboard-title" class="text-xl font-bold text-emerald-400 flex items-center gap-2">
      <ng-icon name="tablerWallet" class="w-6 h-6"></ng-icon>
      <span>Finanças</span>
    </h1>
  </div>

  <nav class="flex-1 p-4">
    <ul class="space-y-2">

      <!-- Dashboard -->
      <li>
        <button
          routerLink="/app/dashboard"
          routerLinkActive="bg-emerald-500/20 text-emerald-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all text-slate-400 hover:bg-slate-700 hover:text-white">

          <ng-icon name="tablerLayoutDashboard" class="w-5 h-5"></ng-icon>
          <span>Dashboard</span>
        </button>
      </li>

      <!-- Contas -->
      <li>
        <button
          routerLink="/app/accounts"
          routerLinkActive="bg-emerald-500/20 text-emerald-400"
          class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all text-slate-400 hover:bg-slate-700 hover:text-white">

          <ng-icon name="tablerBuildingBank" class="w-5 h-5"></ng-icon>
          <span>Contas</span>
        </button>
      </li>

      <!-- Categorias -->
      <li>
        <button
          routerLink="/app/categories"
          routerLinkActive="bg-emerald-500/20 text-emerald-400"
          class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all text-slate-400 hover:bg-slate-700 hover:text-white">

          <ng-icon name="tablerTags" class="w-5 h-5"></ng-icon>
          <span>Categorias</span>
        </button>
      </li>

      <!-- Transações -->
      <li>
        <button
          routerLink="/app/transactions"
          routerLinkActive="bg-emerald-500/20 text-emerald-400"
          class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all text-slate-400 hover:bg-slate-700 hover:text-white">

          <ng-icon name="tablerReceipt" class="w-5 h-5"></ng-icon>
          <span>Transações</span>
        </button>
      </li>

      <!-- Relatórios -->
      <li>
        <button
          routerLink="/app/reports"
          routerLinkActive="bg-emerald-500/20 text-emerald-400"
          class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all text-slate-400 hover:bg-slate-700 hover:text-white">

          <ng-icon name="tablerReportAnalytics" class="w-5 h-5"></ng-icon>
          <span>Relatórios</span>
        </button>
      </li>

    </ul>
  </nav>

  <div class="p-4 border-t border-slate-700">
    <p class="text-xs text-slate-500 text-center">© 2024 Dashboard Financeiro</p>
  </div>
</aside>
