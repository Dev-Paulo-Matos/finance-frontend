<div class="transactions-wrapper">
  <header class="page-header">
    <div class="title-group">
      <h1>Transações</h1>
      <p>Gerencie sua movimentação financeira</p>
    </div>
    <button mat-flat-button color="primary" class="add-btn" (click)="openTransactionForm()">
      <mat-icon>add</mat-icon> Nova Transação
    </button>
  </header>

  <div class="transactions-card mat-elevation-z2">
    <div class="filter-bar">
      <mat-form-field appearance="outline" class="search-field">
        <mat-icon matPrefix>search</mat-icon>
        <input matInput placeholder="Buscar transação...">
      </mat-form-field>
      
      <div class="actions">
        <button mat-stroked-button><mat-icon>filter_list</mat-icon> Filtrar</button>
      </div>
    </div>

    <div class="transaction-list">
      <div class="transaction-item" *ngFor="let t of transactions" (click)="openTransactionForm(t, 'view')">
        <div class="item-left">
          <div class="type-icon" [class.income]="t.type === 'INCOME'" [class.expense]="t.type === 'EXPENSE'">
            <mat-icon>{{ t.type === 'INCOME' ? 'north_east' : 'south_west' }}</mat-icon>
          </div>
          <div class="info">
            <span class="desc">{{ t.description }}</span>
            <span class="details">{{ t.categoryName }} • {{ t.accountName }}</span>
          </div>
        </div>
        
        <div class="item-right">
          <div class="amount-group">
            <span class="value" [class.income]="t.type === 'INCOME'" [class.expense]="t.type === 'EXPENSE'">
              {{ t.type === 'EXPENSE' ? '-' : '+' }} {{ t.amount | currency:'BRL' }}
            </span>
            <span class="date">{{ t.date | date:'dd MMM' }}</span>
          </div>
          <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
            <mat-icon>more_vert</mat-icon>
          </button>
        </div>

        <mat-menu #menu="matMenu">
          <button mat-menu-item class="btn-edit" (click)="openTransactionForm(t, 'edit')">
            <mat-icon>edit</mat-icon> Editar
          </button>
          <button mat-menu-item class="btn-del" (click)="deleteTransaction(t.id)">
            <mat-icon color="warn">delete</mat-icon> Excluir
          </button>
        </mat-menu>
      </div>
    </div>
  </div>
</div>
