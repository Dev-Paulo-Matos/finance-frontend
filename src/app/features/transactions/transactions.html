<div id="tab-transactions" class="tab-content">
  <div class="bg-slate-800 rounded-xl border border-slate-700">

    <div class="p-6 border-b border-slate-700 flex items-center justify-between">
      <h3 class="font-semibold">Transações</h3>

      <button
        class="flex items-center gap-2 px-4 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-colors">

        <ng-icon name="tablerPlus" class="w-4 h-4"></ng-icon>
        <span>Nova Transação</span>

      </button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-slate-700/50">
          <tr>
            <th class="text-left px-6 py-4 text-sm font-medium text-slate-400">Data</th>
            <th class="text-left px-6 py-4 text-sm font-medium text-slate-400">Descrição</th>
            <th class="text-left px-6 py-4 text-sm font-medium text-slate-400">Categoria</th>
            <th class="text-left px-6 py-4 text-sm font-medium text-slate-400">Conta</th>
            <th class="text-right px-6 py-4 text-sm font-medium text-slate-400">Valor</th>
            <th class="text-right px-6 py-4 text-sm font-medium text-slate-400">Ações</th>
          </tr>
        </thead>

        <tbody id="transactions-table" class="divide-y divide-slate-700">
          <tr>
            <td colspan="6" class="px-6 py-8 text-center text-slate-500">
              Nenhuma transação cadastrada
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
