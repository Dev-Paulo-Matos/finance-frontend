<div class="body-all" [class.not-logged]="!isLoggedIn">
  <header>
    <div class="brand">
      <mat-icon color="primary">account_balance_wallet</mat-icon>
      <span>Finance App</span>
    </div>

    <div class="actions">
      @if (isLoggedIn) {
      <button mat-icon-button title="Meu Perfil">
        <mat-icon>account_circle</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="logout()" title="Sair">
        <mat-icon>logout</mat-icon>
      </button>
      } @else {
      <button mat-button routerLink="/login">LOGIN</button>
      <button mat-raised-button color="primary" routerLink="/register">CADASTRAR</button>
      }
    </div>
  </header>

  <nav>
    <button mat-icon-button routerLink="/dashboard" routerLinkActive="active-nav"
      [routerLinkActiveOptions]="{exact: true}" title="Dashboard">
      <mat-icon>grid_view</mat-icon> </button>

    <button mat-icon-button routerLink="/accounts" routerLinkActive="active-nav" title="Contas">
      <mat-icon>account_balance</mat-icon>
    </button>

    <button mat-icon-button routerLink="/transactions" routerLinkActive="active-nav" title="Transações">
      <mat-icon>swap_horiz</mat-icon>
    </button>

    <button mat-icon-button routerLink="/categories" routerLinkActive="active-nav" title="Categorias">
      <mat-icon>category</mat-icon>
    </button>
  </nav>

  <main>
  <ng-content></ng-content>

  @if (loadingService.isLoading()) {
    <div class="loading-overlay">
      <div class="loader-content">
        <mat-spinner diameter="50"></mat-spinner>
        <span>Carregando seus dados...</span>
      </div>
    </div>
  }
</main>
</div>
