<div class="body-all" [class.not-logged]="!isLoggedIn">
  <header>
    <div class="brand">
      <mat-icon color="primary">account_balance_wallet</mat-icon>
      <span>Finance App</span>
    </div>

    <div class="actions">
      <button mat-icon-button title="Pesquisar">
        <mat-icon>search</mat-icon>
      </button>

      @if (isLoggedIn) {
        <button mat-icon-button title="Meu Perfil">
          <mat-icon>account_circle</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="logout()" title="Sair">
          <mat-icon>logout</mat-icon>
        </button>
      } @else {
        <button mat-button routerLink="/login">LOGIN</button>
        <button mat-raised-button color="primary" routerLink="/register">CADASTRAR</button>
      }
    </div>
  </header>

  <nav>
    <button mat-icon-button routerLink="/dashboard" routerLinkActive="active" title="Dashboard">
      <mat-icon>dashboard</mat-icon>
    </button>
    <button mat-icon-button routerLink="/transactions" routerLinkActive="active" title="Transações">
      <mat-icon>swap_horiz</mat-icon>
    </button>
    <button mat-icon-button routerLink="/reports" routerLinkActive="active" title="Relatórios">
      <mat-icon>bar_chart</mat-icon>
    </button>
  </nav>

  <main>
    <ng-content></ng-content>
  </main>
</div>
