<div class="max-w-3xl mx-auto h-full p-2">
  <div class="mb-8">
    <h2 class="text-2xl font-bold text-slate-100 flex items-center gap-3">
      <ng-icon name="tablerUser" class="text-emerald-400"></ng-icon>
      Meu Perfil
    </h2>
    <p class="text-slate-400 mt-1">Gerencie suas informações pessoais e credenciais de acesso.</p>
  </div>

  <div class="bg-slate-800 rounded-xl border border-slate-700 p-8 shadow-lg">
    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="space-y-6">
      
      <!-- Nome -->
      <div class="space-y-2">
        <label for="name" class="block text-sm font-medium text-slate-300">Nome Completo</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <ng-icon name="tablerUser" class="text-slate-500"></ng-icon>
          </div>
          <input
            type="text"
            id="name"
            formControlName="name"
            class="block w-full pl-10 pr-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-colors"
            placeholder="Seu nome"
          />
        </div>
      </div>

      <!-- Email (Read-only) -->
      <div class="space-y-2">
        <label for="email" class="block text-sm font-medium text-slate-300">E-mail de Acesso</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <ng-icon name="tablerMail" class="text-slate-500"></ng-icon>
          </div>
          <input
            type="email"
            id="email"
            formControlName="email"
            class="block w-full pl-10 pr-3 py-2.5 bg-slate-900/50 border border-slate-700 rounded-lg text-slate-400 cursor-not-allowed focus:outline-none"
          />
        </div>
        <p class="text-xs text-slate-500">O e-mail não pode ser alterado pois é sua chave de login.</p>
      </div>

      <!-- Telefone -->
      <div class="space-y-2">
        <label for="phone" class="block text-sm font-medium text-slate-300">Telefone</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <ng-icon name="tablerPhone" class="text-slate-500"></ng-icon>
          </div>
          <input
            type="text"
            id="phone"
            formControlName="phone"
            class="block w-full pl-10 pr-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-colors"
            placeholder="(XX) XXXXX-XXXX"
          />
        </div>
      </div>

      <!-- Senha -->
      <div class="space-y-2">
        <label for="password" class="block text-sm font-medium text-slate-300">Nova Senha (Opcional)</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <ng-icon name="tablerLock" class="text-slate-500"></ng-icon>
          </div>
          <input
            type="password"
            id="password"
            formControlName="password"
            class="block w-full pl-10 pr-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-colors"
            placeholder="Preencha apenas se desejar trocar"
          />
        </div>
      </div>

      <!-- Submit Section -->
      <div class="pt-6 flex items-center justify-end gap-4 border-t border-slate-700/50 text-right">
        
        <div *ngIf="successMessage" class="flex items-center gap-2 text-emerald-400 text-sm animate-pulse">
          <ng-icon name="tablerCheck"></ng-icon>
          {{ successMessage }}
        </div>

        <div *ngIf="errorMessage" class="flex items-center gap-2 text-red-400 text-sm">
          {{ errorMessage }}
        </div>

        <button
          type="submit"
          [disabled]="profileForm.invalid || isSaving"
          class="flex items-center justify-center gap-2 px-6 py-2.5 bg-emerald-500 text-white rounded-lg font-medium hover:bg-emerald-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:ring-offset-2 focus:ring-offset-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          <span *ngIf="!isSaving">Salvar Alterações</span>
          <span *ngIf="isSaving" class="animate-pulse">Salvando...</span>
        </button>

      </div>
    </form>
  </div>
</div>
