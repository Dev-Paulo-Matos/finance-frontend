<header class="h-16 bg-slate-800 border-b border-slate-700 flex items-center justify-between px-6 shrink-0">
  <div class="flex items-center gap-4">
    <h2 id="page-title" class="text-lg font-semibold">Dashboard</h2>
  </div>

  <div class="flex items-center gap-4">

    <div class="flex items-center gap-3 px-4 py-2 bg-slate-700 rounded-full">
      <div class="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center">
        <ng-icon name="tablerUser" class="w-4 h-4 text-white"></ng-icon>
      </div>

      <span id="user-name" class="text-sm font-medium">{{user?.name}}</span>
    </div>

    <button
      class="flex items-center gap-2 px-4 py-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30 transition-colors" (click)="logout()">
      
      <ng-icon name="tablerLogout" class="w-4 h-4"></ng-icon>
      <span class="text-sm">Sair</span>

    </button>

  </div>
</header>
