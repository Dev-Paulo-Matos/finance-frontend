<div class="accounts-wrapper">
  <header class="page-header">
    <div class="summary">
      <span class="label">PATRIMÔNIO TOTAL</span>
      <h1 class="total-amount">{{ getTotalBalance() | currency:'BRL' }}</h1>
    </div>
    <button mat-flat-button color="primary" class="add-btn-top" (click)="openAccountForm()">
      <mat-icon>add</mat-icon> Nova Conta
    </button>
  </header>

  <div class="accounts-grid">
    <div class="account-card mat-elevation-z2" *ngFor="let acc of accounts">
      <div class="card-header">
        <div class="bank-info">
          <div class="bank-logo">
            <mat-icon>account_balance</mat-icon>
          </div>
          <div class="title-group">
            <h3>{{ acc.name }}</h3>
            <span class="description">{{ acc.desc }}</span>
          </div>
        </div>
        
        <button mat-icon-button [matMenuTriggerFor]="menu" class="more-btn">
          <mat-icon>more_vert</mat-icon>
        </button>
        
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="openAccountForm(acc, 'edit')">
            <mat-icon>edit</mat-icon>
            <span>Editar</span>
          </button>
          <button mat-menu-item (click)="deleteAccount(acc.id)">
            <mat-icon color="warn">delete</mat-icon>
            <span>Excluir</span>
          </button>
        </mat-menu>
      </div>

      <div class="card-body">
        <span class="balance-label">Saldo Disponível</span>
        <h2 class="balance" [class.negative]="acc.balance < 0">
          {{ acc.balance | currency:'BRL' }}
        </h2>
      </div>

      <div class="card-footer">
        <button mat-button color="primary" class="view-btn">
          Ver Extrato
          <mat-icon iconPositionEnd>chevron_right</mat-icon>
        </button>
      </div>
    </div>

    <button class="add-account-card" (click)="openAccountForm()">
      <mat-icon>add_circle_outline</mat-icon>
      <span>Adicionar Nova Conta</span>
    </button>
  </div>
</div>
