<div id="tab-accounts" class="tab-content">
  <div class="bg-slate-800 rounded-xl border border-slate-700">

    <!-- Header -->
    <div class="p-6 border-b border-slate-700 flex items-center justify-between">
      <h3 class="font-semibold">Contas</h3>

      <button
        class="flex items-center gap-2 px-4 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-colors"
        (click)="novaContaDrawer()">

        <ng-icon name="tablerPlus" class="w-4 h-4"></ng-icon>
        <span>Nova Conta</span>

      </button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full">

        <thead class="bg-slate-700/50">
          <tr>
            <th class="text-left px-6 py-4 text-sm font-medium text-slate-400 w-1/2">
              Conta
            </th>

            <th class="text-left px-6 py-4 text-sm font-medium text-slate-400 w-1/4">
              Saldo
            </th>

            <th class="text-right px-6 py-4 text-sm font-medium text-slate-400 w-1/4">
              Ações
            </th>
          </tr>
        </thead>

        <tbody class="divide-y divide-slate-700">

          <!-- Empty state -->
          <tr *ngIf="accounts.length === 0">
            <td colspan="3" class="px-6 py-10 text-center text-slate-500">
              Nenhuma conta cadastrada
            </td>
          </tr>

          <!-- Accounts -->
          <tr *ngFor="let account of accounts" class="hover:bg-slate-700/40 transition-colors">

            <!-- Nome + descrição -->
            <td class="px-6 py-4">

              <div class="flex flex-col">

                <span class="font-medium text-white">
                  {{ account.name }}
                </span>

                <span *ngIf="account.desc" class="text-xs text-slate-400">

                  {{ account.desc }}

                </span>

              </div>

            </td>

            <!-- Saldo -->
            <td class="px-6 py-4 font-semibold" [ngClass]="{
                'text-emerald-400': account.balance >= 0,
                'text-red-400': account.balance < 0
              }">

              {{ account?.balance | currency:'BRL' }}

            </td>

            <!-- Ações -->
            <td class="px-6 py-4">

              <div class="flex justify-end gap-3">

                <button class="text-slate-400 hover:text-white transition-colors" (click)="editAccount(account)">

                  <ng-icon name="tablerEdit" class="w-5 h-5"></ng-icon>

                </button>

                <button class="text-slate-400 hover:text-red-400 transition-colors" (click)="deleteAccount(account)">

                  <ng-icon name="tablerTrash" class="w-5 h-5"></ng-icon>

                </button>

              </div>

            </td>

          </tr>

        </tbody>

      </table>

      <div class="flex items-center justify-between p-4 border-t border-slate-700">

        <span class="text-sm text-slate-400">
          {{ totalElements || 0 }} registros
        </span>

        <div class="flex items-center gap-3">

          <button (click)="previousPage()" [disabled]="page === 0"
            class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 disabled:opacity-40">

            Anterior

          </button>

          <span class="text-sm text-slate-300">
            Página {{ page + 1 }} / {{ totalPages }}
          </span>

          <button (click)="nextPage()" [disabled]="page + 1 >= totalPages"
            class="px-3 py-1 bg-slate-700 rounded hover:bg-slate-600 disabled:opacity-40">

            Próxima

          </button>

        </div>

      </div>
    </div>

  </div>
</div>
