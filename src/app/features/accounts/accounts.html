<div class="accounts-wrapper">
  <header class="page-header">
    <div class="summary">
      <span class="label">PATRIMÔNIO TOTAL</span>
      <h1 class="total-amount">{{ getTotalBalance() | currency:'BRL' }}</h1>
    </div>
  </header>

  <div class="accounts-grid">
    <div class="account-card" *ngFor="let acc of accounts" (click)="openAccountForm(acc, 'view')">
      <div class="card-header">
        <div class="bank-info">
          <div class="bank-logo">
            <mat-icon>account_balance</mat-icon>
          </div>
          <div class="title-group">
            <h3>{{ acc.name }}</h3>
            <span class="description">{{ acc.desc }}</span>
          </div>
        </div>
        
        <button mat-icon-button [matMenuTriggerFor]="menu" class="more-btn" (click)="$event.stopPropagation()">
          <mat-icon>more_vert</mat-icon>
        </button>
        
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="openAccountForm(acc, 'view')" class="btn-view">
            <mat-icon color="primary">visibility</mat-icon>
          </button>
          <button mat-menu-item (click)="openAccountForm(acc, 'edit')" class="btn-edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-menu-item (click)="deleteAccount(acc.id)" class="btn-del">
            <mat-icon color="warn">delete</mat-icon>
          </button>
        </mat-menu>
      </div>

      <div class="card-body">
        <span class="balance-label">Saldo Disponível</span>
        <h2 class="balance" [class.negative]="acc.balance < 0">
          {{ acc.balance | currency:'BRL' }}
        </h2>
      </div>

      <div class="card-footer">
        <button mat-button class="extrato-btn">
          <span>Ver Extrato</span>
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>

    <div class="add-account-card" (click)="openAccountForm()">
      <div class="add-content">
        <mat-icon>add_circle_outline</mat-icon>
        <span>Nova Conta</span>
      </div>
    </div>
  </div>
</div>
