<div id="app" class="h-full w-full flex overflow-hidden">
  <app-loader></app-loader>
  <ng-container *ngIf="isAppReady$ | async; else authLayout">

    <app-navbar-lateral class="h-full"></app-navbar-lateral>

    <div class="flex-1 flex flex-col overflow-hidden">

      <app-navbar-header></app-navbar-header>

      <main class="flex-1 overflow-auto p-6 scrollbar-thin route-container h-full w-full">
        <router-outlet></router-outlet>
      </main>

    </div>

  </ng-container>

  <ng-template #authLayout>
    <div class="w-full h-full">
      <router-outlet></router-outlet>
    </div>
  </ng-template>

</div>
<app-side-drawer></app-side-drawer>
